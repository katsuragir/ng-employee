<div class="h-screen bg-white border-r border-gray-200 flex flex-col transition-all duration-300 ease-in-out shadow-sm"
    [ngClass]="isExpanded ? 'w-64' : 'w-16'">

    <div class="h-14 flex items-center justify-center border-b border-gray-100 bg-gray-50">
        <mat-icon class="text-blue-600 font-bold" [ngClass]="isExpanded ? 'scale-125' : 'scale-100'">
            account_balance
        </mat-icon>
        <span *ngIf="isExpanded" class="ml-3 font-bold text-gray-800 tracking-wide">Backoffice</span>
    </div>

    <div class="flex-1 py-4 flex flex-col gap-2 px-2">
        <a routerLink="/employee-list" routerLinkActive="bg-green-50 text-green-700 font-semibold"
            class="flex items-center p-3 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors cursor-pointer group"
            [title]="!isExpanded ? 'Employee Management' : ''">
            <mat-icon [ngClass]="{'text-green-600': true}">people</mat-icon>
            <span *ngIf="isExpanded" class="ml-4 whitespace-nowrap">Employee</span>
        </a>
    </div>

    <div class="p-2 border-t border-gray-100">
        <a class="flex items-center p-3 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors cursor-pointer">
            <mat-icon>settings</mat-icon>
            <span *ngIf="isExpanded" class="ml-4 whitespace-nowrap">Settings</span>
        </a>
    </div>
</div>
